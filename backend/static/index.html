<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/avatar.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4A90D9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="作业辅导" />
    <link rel="manifest" href="/manifest.json" />
    <title>小学作业辅导助手</title>
    <script type="module" crossorigin src="/assets/index-DICx4yk9.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-bF_Ykpsr.css">
  </head>
  <body>
    <div id="app">
      <div id="cold-start-hint">
        <div class="cs-icon">&#9881;</div>
        <div class="cs-title">小学作业辅导助手</div>
        <div class="cs-sub">服务器正在唤醒中，请稍候…</div>
        <div class="cs-dots"><span></span><span></span><span></span></div>
        <div class="cs-note" id="cs-elapsed">预计还需 20~60 秒</div>
      </div>
    </div>
    <style>
      #cold-start-hint{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f4fd 0%,#f0f7ff 100%);z-index:9999;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
      .cs-icon{font-size:48px;color:#4A90D9;animation:cs-pulse 1.5s ease-in-out infinite;}
      .cs-title{font-size:20px;font-weight:700;color:#2c3e50;margin-top:16px;}
      .cs-sub{font-size:14px;color:#7f8c8d;margin-top:8px;}
      .cs-dots{margin-top:20px;display:flex;gap:8px;}
      .cs-dots span{width:8px;height:8px;background:#4A90D9;border-radius:50%;animation:cs-bounce 1.2s ease-in-out infinite;}
      .cs-dots span:nth-child(2){animation-delay:.15s}.cs-dots span:nth-child(3){animation-delay:.3s}
      .cs-note{font-size:12px;color:#95a5a6;margin-top:16px;}
      @keyframes cs-pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
      @keyframes cs-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}}
    </style>
    <script>
      (function(){var t=Date.now();setInterval(function(){var s=Math.floor((Date.now()-t)/1000);var m=Math.max(1,Math.ceil((60-s)/10)*10);var e=document.getElementById('cs-elapsed');if(e)e.textContent='已等待 '+s+' 秒，预计还需 '+m+' 秒';if(s>60&&e)e.textContent='已等待 '+s+' 秒，服务器即将就绪…';},2000)})();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {})
      }
    </script>
  </body>
</html>
